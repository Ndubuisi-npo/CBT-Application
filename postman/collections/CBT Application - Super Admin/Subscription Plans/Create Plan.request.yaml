$kind: http-request
name: Create Plan
method: POST
url: '{{baseUrl}}/admin/plans'
headers:
  - key: Authorization
    value: 'Bearer {{adminToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "",
      "price": 0,
      "features": []
    }
