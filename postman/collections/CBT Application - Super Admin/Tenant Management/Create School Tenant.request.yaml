$kind: http-request
name: Create School Tenant
method: POST
url: '{{baseUrl}}/admin/tenants'
headers:
  - key: Authorization
    value: 'Bearer {{adminToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "",
      "email": "",
      "domain": "",
      "planId": "{{planId}}"
    }
